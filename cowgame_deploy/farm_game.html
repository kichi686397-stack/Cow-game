<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小牛耕地·多宇宙点击版</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-top: #fff8eb;
      --bg-bottom: #f8edd9;
      --shell-bg: rgba(255,255,255,0.78);
      --shell-border: #d9b67a;
      --panel-bg: #fff8ee;
      --panel-border: #e8c891;
      --field-bg: #f6e2b8;
      --field-border: #cf9d5f;
      --text-main: #5b3b1d;
      --text-soft: #8a4c11;
      --progress-a: #85c35d;
      --progress-b: #5ca63a;
      --btn-a: #ffcf72;
      --btn-b: #f5ab1f;
      --btn-secondary-bg: #efe1c6;
      --btn-secondary-border: #e0c08b;
      --tile-normal-a: #d3a269;
      --tile-normal-b: #b7793f;
      --tile-plowed-a: #8a572b;
      --tile-plowed-b: #6c411e;
      --tile-golden-a: #ffd86b;
      --tile-golden-b: #f1b52d;
      --tile-stone-a: #b9bcc4;
      --tile-stone-b: #8e949f;
      --overlay-bg: rgba(255, 248, 232, 0.92);
      --overlay-border: #d7ac6a;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      background: radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 30%), linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 18%), radial-gradient(circle at 80% 10%, rgba(255,255,255,0.08), transparent 14%);
    }

    body::after {
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .game-shell {
      width: min(980px, 100%);
      background: var(--shell-bg);
      border: 3px solid var(--shell-border);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      padding: 18px;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: color-mix(in srgb, var(--panel-bg) 92%, white 8%);
      border: 2px solid var(--panel-border);
      border-radius: 18px;
      padding: 12px 14px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.72;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }

    .field-wrap {
      background: var(--field-bg);
      border-radius: 24px;
      border: 3px solid var(--field-border);
      padding: 16px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .field-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }

    .field-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .field {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      user-select: none;
      position: relative;
      z-index: 1;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 2px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      cursor: pointer;
      position: relative;
      transition: transform 0.12s ease, filter 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
    }

    .tile:hover { transform: translateY(-2px) scale(1.02); }

    .tile.unplowed {
      background: linear-gradient(180deg, var(--tile-normal-a) 0%, var(--tile-normal-b) 100%);
    }

    .tile.unplowed::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 3px, transparent 3px, transparent 11px);
      mix-blend-mode: screen;
    }

    .tile.plowed {
      background: linear-gradient(180deg, var(--tile-plowed-a) 0%, var(--tile-plowed-b) 100%);
      cursor: default;
      filter: saturate(0.95);
    }

    .tile.plowed::before {
      content: "✓";
      position: absolute;
      right: 10px;
      top: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
    }

    .tile.golden.unplowed {
      background: linear-gradient(180deg, var(--tile-golden-a) 0%, var(--tile-golden-b) 100%);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.16), 0 0 18px rgba(255,255,255,0.18);
    }

    .tile.stone.unplowed {
      background: linear-gradient(180deg, var(--tile-stone-a) 0%, var(--tile-stone-b) 100%);
    }

    .tile.stone.unplowed::after {
      content: "×2";
      position: absolute;
      right: 8px;
      bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      background: rgba(0,0,0,0.22);
      padding: 2px 6px;
      border-radius: 999px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 20px;
      padding: 14px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .cow-box {
      min-height: 164px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .cow-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      transition: transform 0.12s ease;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
    }

    .cow-img.bump {
      transform: translateY(-8px) rotate(-5deg) scale(1.05);
    }

    .cow.bump {
      transform: translateY(-8px) rotate(-5deg) scale(1.05);
    }

    .feedback {
      min-height: 24px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-soft);
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.15s ease, filter 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px) scale(0.99); }

    .primary {
      background: linear-gradient(180deg, var(--btn-a) 0%, var(--btn-b) 100%);
      color: var(--text-main);
    }

    .secondary {
      background: var(--btn-secondary-bg);
      color: var(--text-main);
      border: 2px solid var(--btn-secondary-border);
    }

    .universe-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .universe-btn {
      padding: 10px 8px;
      font-size: 14px;
      border-radius: 14px;
    }

    .universe-btn.active {
      filter: brightness(1.04);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.42);
    }

    .theme-desc {
      margin-top: 10px;
      min-height: 38px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      opacity: 0.92;
    }

    .progress-bar {
      height: 14px;
      background: rgba(255,255,255,0.28);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--progress-a) 0%, var(--progress-b) 100%);
      transition: width 0.2s ease;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
      font-size: 14px;
    }

    .floating-text {
      position: absolute;
      pointer-events: none;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      animation: floatUp 0.9s ease forwards;
      z-index: 10;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.9); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-36px) scale(1.1); opacity: 0; }
    }

    .overlay {
      position: absolute;
      inset: 16px;
      background: var(--overlay-bg);
      border: 3px dashed var(--overlay-border);
      border-radius: 20px;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      z-index: 15;
      backdrop-filter: blur(4px);
    }

    .overlay.show { display: flex; }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .overlay-card p {
      margin: 6px 0;
      font-size: 16px;
    }

    body.theme-cyberpunk {
      --bg-top: #130823;
      --bg-bottom: #05060f;
      --shell-bg: rgba(18, 16, 39, 0.82);
      --shell-border: #8c4cff;
      --panel-bg: rgba(22, 19, 48, 0.92);
      --panel-border: #36e6ff;
      --field-bg: linear-gradient(180deg, #120f29 0%, #090c19 100%);
      --field-border: #ff4fd8;
      --text-main: #e6dbff;
      --text-soft: #7ff4ff;
      --progress-a: #1cf2ff;
      --progress-b: #ff49c8;
      --btn-a: #23d7ff;
      --btn-b: #9f3cff;
      --btn-secondary-bg: rgba(32, 28, 63, 0.95);
      --btn-secondary-border: #2be4ff;
      --tile-normal-a: #202447;
      --tile-normal-b: #121b37;
      --tile-plowed-a: #ff39cb;
      --tile-plowed-b: #6b2cff;
      --tile-golden-a: #55fff3;
      --tile-golden-b: #13b7ff;
      --tile-stone-a: #483f6d;
      --tile-stone-b: #2f2b4d;
      --overlay-bg: rgba(11, 8, 28, 0.9);
      --overlay-border: #3ae8ff;
    }

    body.theme-cyberpunk::before {
      background: radial-gradient(circle at 20% 20%, rgba(255, 70, 210, 0.18), transparent 18%), radial-gradient(circle at 80% 15%, rgba(54, 230, 255, 0.16), transparent 18%), linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 49%, transparent 50%, transparent 100%);
      background-size: auto, auto, 80px 80px;
    }

    body.theme-cyberpunk::after {
      opacity: 1;
      background: linear-gradient(180deg, rgba(23, 9, 48, 0.2), transparent 25%, transparent 75%, rgba(0,0,0,0.18)), repeating-linear-gradient(90deg, transparent 0 48px, rgba(68, 255, 244, 0.05) 48px 49px);
    }

    body.theme-cyberpunk .field-wrap::before {
      background: linear-gradient(90deg, rgba(54,230,255,0.08) 1px, transparent 1px), linear-gradient(0deg, rgba(255,79,216,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      box-shadow: inset 0 0 50px rgba(55, 231, 255, 0.06);
    }

    body.theme-cyberpunk .field-wrap::after {
      opacity: 1;
      background: radial-gradient(circle at 20% 15%, rgba(66,255,243,0.18), transparent 18%), radial-gradient(circle at 86% 82%, rgba(255,74,206,0.16), transparent 20%);
    }

    body.theme-cyberpunk .tile.unplowed::before {
      background:
        linear-gradient(90deg, transparent 0 26%, rgba(84,255,240,0.28) 26% 28%, transparent 28% 72%, rgba(255,88,211,0.22) 72% 74%, transparent 74%),
        linear-gradient(0deg, transparent 0 42%, rgba(255,255,255,0.10) 42% 45%, transparent 45% 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 3px, transparent 3px, transparent 11px);
      mix-blend-mode: screen;
    }

    body.theme-cyberpunk .tile.plowed {
      box-shadow: inset 0 0 16px rgba(255,255,255,0.15), 0 0 14px rgba(146, 74, 255, 0.28);
    }

    body.theme-underwater {
      --bg-top: #083650;
      --bg-bottom: #021a29;
      --shell-bg: rgba(9, 41, 58, 0.82);
      --shell-border: #48d4ff;
      --panel-bg: rgba(7, 47, 66, 0.92);
      --panel-border: #72f0ff;
      --field-bg: linear-gradient(180deg, #0d4b69 0%, #08354c 100%);
      --field-border: #52dfff;
      --text-main: #e8fcff;
      --text-soft: #91f6ff;
      --progress-a: #6ff7ff;
      --progress-b: #3ed0ff;
      --btn-a: #7df8ff;
      --btn-b: #33c7f5;
      --btn-secondary-bg: rgba(14, 72, 98, 0.95);
      --btn-secondary-border: #7ff4ff;
      --tile-normal-a: #1f758f;
      --tile-normal-b: #14576c;
      --tile-plowed-a: #ff8759;
      --tile-plowed-b: #e35268;
      --tile-golden-a: #ffdd88;
      --tile-golden-b: #ffa94c;
      --tile-stone-a: #628694;
      --tile-stone-b: #456170;
      --overlay-bg: rgba(3, 27, 43, 0.9);
      --overlay-border: #7ff3ff;
    }

    body.theme-underwater::before {
      background: radial-gradient(circle at 18% 22%, rgba(255,255,255,0.16), transparent 9%), radial-gradient(circle at 76% 18%, rgba(255,255,255,0.12), transparent 8%), radial-gradient(circle at 30% 80%, rgba(255,255,255,0.10), transparent 7%);
      animation: bubbles 12s linear infinite;
      opacity: 0.9;
    }

    body.theme-underwater::after {
      opacity: 1;
      background: linear-gradient(180deg, rgba(131, 245, 255, 0.08), transparent 20%, transparent 70%, rgba(0,0,0,0.12));
    }

    body.theme-underwater .field-wrap::before {
      background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.14) 0 8px, transparent 9px), radial-gradient(circle at 80% 75%, rgba(255,255,255,0.12) 0 10px, transparent 11px), radial-gradient(circle at 30% 90%, rgba(255,255,255,0.1) 0 6px, transparent 7px), linear-gradient(180deg, rgba(255,255,255,0.08), transparent 35%);
    }

    body.theme-underwater .field-wrap::after {
      opacity: 1;
      background:
        radial-gradient(circle at 8% 100%, rgba(255,140,113,0.55) 0 22px, transparent 23px),
        radial-gradient(circle at 15% 100%, rgba(248,105,127,0.42) 0 16px, transparent 17px),
        radial-gradient(circle at 86% 100%, rgba(255,173,95,0.50) 0 20px, transparent 21px),
        radial-gradient(circle at 76% 100%, rgba(111,255,218,0.25) 0 15px, transparent 16px),
        linear-gradient(180deg, transparent 74%, rgba(4, 38, 54, 0.24) 75% 100%);
      background-repeat: no-repeat;
    }

    body.theme-underwater .tile.unplowed::before {
      background:
        radial-gradient(circle at 22% 24%, rgba(255,255,255,0.22) 0 5px, transparent 6px),
        radial-gradient(circle at 75% 68%, rgba(255,255,255,0.15) 0 4px, transparent 5px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 3px, transparent 3px, transparent 11px);
      mix-blend-mode: screen;
    }

    @keyframes bubbles {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    body.theme-space {
      --bg-top: #0d1330;
      --bg-bottom: #02040d;
      --shell-bg: rgba(15, 17, 40, 0.82);
      --shell-border: #8ea2ff;
      --panel-bg: rgba(18, 23, 54, 0.92);
      --panel-border: #bcc7ff;
      --field-bg: linear-gradient(180deg, #0c1636 0%, #090c1a 100%);
      --field-border: #93a5ff;
      --text-main: #eef2ff;
      --text-soft: #c9d1ff;
      --progress-a: #c7d0ff;
      --progress-b: #7a89ff;
      --btn-a: #d9dcff;
      --btn-b: #8493ff;
      --btn-secondary-bg: rgba(32, 38, 84, 0.95);
      --btn-secondary-border: #b7c0ff;
      --tile-normal-a: #2e3768;
      --tile-normal-b: #1a2247;
      --tile-plowed-a: #7f5dff;
      --tile-plowed-b: #3c287c;
      --tile-golden-a: #fff0a2;
      --tile-golden-b: #ffc96a;
      --tile-stone-a: #7d86ab;
      --tile-stone-b: #545d7e;
      --overlay-bg: rgba(9, 10, 27, 0.9);
      --overlay-border: #d7ddff;
    }

    body.theme-space::before {
      background: radial-gradient(circle at 12% 18%, rgba(255,255,255,0.95) 0 1px, transparent 2px), radial-gradient(circle at 35% 42%, rgba(255,255,255,0.9) 0 1px, transparent 2px), radial-gradient(circle at 78% 14%, rgba(255,255,255,0.85) 0 1.4px, transparent 2px), radial-gradient(circle at 66% 70%, rgba(255,255,255,0.9) 0 1px, transparent 2px), radial-gradient(circle at 89% 54%, rgba(255,255,255,0.75) 0 1px, transparent 2px), radial-gradient(circle at 20% 82%, rgba(255,255,255,0.8) 0 1.2px, transparent 2px), radial-gradient(circle at center, rgba(89, 95, 221, 0.16), transparent 48%);
      background-size: cover;
    }

    body.theme-space::after {
      opacity: 1;
      background: radial-gradient(circle at 30% 30%, rgba(182, 194, 255, 0.08), transparent 20%), radial-gradient(circle at 70% 65%, rgba(135, 119, 255, 0.10), transparent 22%), radial-gradient(circle at 50% 52%, rgba(125, 88, 255, 0.16), transparent 26%), radial-gradient(circle at 58% 46%, rgba(255, 160, 236, 0.08), transparent 18%);
      animation: stardrift 16s linear infinite;
    }

    body.theme-space .field-wrap::before {
      background: radial-gradient(circle at 15% 20%, rgba(255,255,255,0.15) 0 2px, transparent 3px), radial-gradient(circle at 76% 26%, rgba(255,255,255,0.12) 0 2px, transparent 3px), linear-gradient(180deg, rgba(171,182,255,0.06), transparent 45%);
    }

    body.theme-space .field-wrap::after {
      opacity: 1;
      background: radial-gradient(circle at 18% 16%, rgba(255,255,255,0.22) 0 2px, transparent 3px), radial-gradient(circle at 84% 28%, rgba(255,255,255,0.18) 0 2px, transparent 3px), radial-gradient(circle at 65% 82%, rgba(255,255,255,0.14) 0 2px, transparent 3px), linear-gradient(180deg, transparent 72%, rgba(105, 117, 255, 0.16) 100%);
    }

    body.theme-space .tile.unplowed::before {
      background:
        radial-gradient(circle at 20% 24%, rgba(255,255,255,0.18) 0 3px, transparent 4px),
        radial-gradient(circle at 76% 68%, rgba(255,255,255,0.12) 0 2px, transparent 3px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 3px, transparent 3px, transparent 11px);
      mix-blend-mode: screen;
    }

    @keyframes stardrift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-12px, 10px, 0); }
    }

    body.theme-ancient {
      --bg-top: #ffcf86;
      --bg-bottom: #d98a49;
      --shell-bg: rgba(255, 241, 220, 0.82);
      --shell-border: #b26f31;
      --panel-bg: rgba(255, 244, 225, 0.94);
      --panel-border: #d19355;
      --field-bg: linear-gradient(180deg, #efbf79 0%, #d89658 100%);
      --field-border: #a8652e;
      --text-main: #5d3314;
      --text-soft: #8b4718;
      --progress-a: #f1b85d;
      --progress-b: #c97324;
      --btn-a: #ffd086;
      --btn-b: #df8d39;
      --btn-secondary-bg: #f1d8b2;
      --btn-secondary-border: #cf9a5d;
      --tile-normal-a: #d09a59;
      --tile-normal-b: #a86a34;
      --tile-plowed-a: #8f5529;
      --tile-plowed-b: #6f3d1c;
      --tile-golden-a: #ffe08a;
      --tile-golden-b: #ebb149;
      --tile-stone-a: #b6a18c;
      --tile-stone-b: #8f7966;
      --overlay-bg: rgba(255, 241, 219, 0.92);
      --overlay-border: #bf7c36;
    }

    body.theme-ancient::before {
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 30%), radial-gradient(circle at 20% 75%, rgba(255, 225, 168, 0.22), transparent 18%), radial-gradient(circle at 78% 78%, rgba(255, 196, 120, 0.16), transparent 20%);
    }

    body.theme-ancient::after {
      opacity: 1;
      background: radial-gradient(circle at 78% 18%, rgba(255, 232, 176, 0.42) 0 90px, transparent 91px), linear-gradient(180deg, rgba(255,255,255,0.10), transparent 35%);
    }

    body.theme-ancient .field-wrap::before {
      background: linear-gradient(180deg, rgba(255,248,223,0.18), transparent 24%), radial-gradient(circle at 12% 90%, rgba(124,77,30,0.10), transparent 20%), radial-gradient(circle at 88% 88%, rgba(124,77,30,0.10), transparent 20%);
    }

    body.theme-ancient .field-wrap::after {
      opacity: 1;
      background:
        linear-gradient(180deg, transparent 72%, rgba(110, 64, 26, 0.10) 100%),
        repeating-linear-gradient(90deg, rgba(126,78,35,0.06) 0 2px, transparent 2px 18px);
    }

    body.theme-ancient .tile.unplowed::before {
      background:
        linear-gradient(180deg, rgba(255,240,200,0.12), transparent 35%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 3px, transparent 3px, transparent 11px);
      mix-blend-mode: screen;
    }

    body.theme-ancient .tile.plowed {
      box-shadow: inset 0 0 16px rgba(255, 229, 170, 0.10);
    }

    .mode-btn {
      border: 2px solid var(--panel-border);
      border-radius: 14px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--panel-bg);
      color: var(--text-main);
      transition: all .15s;
      line-height: 1.5;
      text-align: center;
    }
    .mode-btn small { font-weight: normal; font-size: 11px; opacity: .7; display: block; }
    .mode-btn.active {
      background: linear-gradient(180deg, var(--btn-a), var(--btn-b));
      border-color: var(--btn-b);
      color: #5b3b1d;
    }
    .mode-btn:hover { transform: translateY(-1px); }

    #comboRing { transform-origin: center; }
    .combo-flash { animation: comboFlash 0.2s ease-out; }
    @keyframes comboFlash { 0%{transform:scale(1.3)} 100%{transform:scale(1)} }

    @media (max-width: 820px) {
      .topbar { grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
      .cow { font-size: 60px; }
      .universe-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="topbar">
      <div class="stat">
        <div class="stat-label">模式</div>
        <div class="stat-value" id="modeName" style="font-size:14px">🌾 丰收竞赛</div>
      </div>
      <div class="stat">
        <div class="stat-label">计时</div>
        <div class="stat-value" id="timerText">30</div>
      </div>
      <div class="stat">
        <div class="stat-label">耕地进度</div>
        <div class="stat-value" id="progressText">0%</div>
      </div>
      <div class="stat">
        <div class="stat-label">得分</div>
        <div class="stat-value" id="scoreText">0</div>
      </div>
      <div class="stat" style="position:relative;padding:10px 14px">
        <div class="stat-label">连击</div>
        <div style="position:relative;width:56px;height:56px;margin:0 auto">
          <svg width="56" height="56" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
            <circle id="comboRingBg" cx="28" cy="28" r="24" fill="none" stroke="#eee" stroke-width="4"/>
            <circle id="comboRing" cx="28" cy="28" r="24" fill="none" stroke="#f5ab1f"
              stroke-width="4" stroke-dasharray="150.8" stroke-dashoffset="150.8"
              stroke-linecap="round" style="transition:stroke-dashoffset 0.05s linear,stroke 0.1s"/>
          </svg>
          <div id="comboText" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--text-main)">x0</div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-label">剩余地块</div>
        <div class="stat-value" id="leftText">25</div>
      </div>
    </div>

    <div class="main">
      <div class="field-wrap" id="fieldWrap">
        <div class="field" id="field"></div>
        <div class="overlay" id="winOverlay">
          <div class="overlay-card">
            <h2>哞！耕完啦</h2>
            <p>这片地已经被勤劳小牛承包了</p>
            <p>最终得分：<span id="finalScore">0</span></p>
            <p>最高连击：<span id="finalCombo">0</span></p>
            <p id="finalTimeRow">用时：<span id="finalTime">30s</span></p>
            <div style="height: 12px"></div>
            <button class="primary" id="restartBtn">再耕一轮</button>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <h3>小牛状态</h3>
          <div class="cow-box">
            <img id="cow" class="cow-img" src="cow-farm.png" />
            <div class="feedback" id="feedback">点地块，让小牛开始干活</div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="panel">
          <h3>操作按钮</h3>
          <div class="actions">
            <button class="secondary" id="resetBtn">重新开始</button>
          </div>
        </div>

        <div class="panel">
          <h3>选择模式</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <button class="mode-btn active" id="modeA" data-mode="A">🌾 丰收竞赛<br><small>30秒冲高分</small></button>
            <button class="mode-btn" id="modeB" data-mode="B">⚡ 闪电耕作<br><small>25块田最速</small></button>
          </div>
          <div style="font-size:12px;color:var(--text-soft);text-align:center" id="modeDesc">🌾 丰收竞赛：30秒内尽可能多耕地，田耕完自动补充</div>
        </div>

        <div class="panel" style="font-size:12px;color:var(--text-soft);line-height:1.8">
          💡 金色地块额外加分 · 石头地块点两下 · 1秒内连击不断
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── DOM refs ──
    const field = document.getElementById('field');
    const fieldWrap = document.getElementById('fieldWrap');
    const modeName = document.getElementById('modeName');
    const timerText = document.getElementById('timerText');
    const progressText = document.getElementById('progressText');
    const scoreText = document.getElementById('scoreText');
    const comboText = document.getElementById('comboText');
    const leftText = document.getElementById('leftText');
    const feedback = document.getElementById('feedback');
    const cow = document.getElementById('cow');
    const progressFill = document.getElementById('progressFill');
    const resetBtn = document.getElementById('resetBtn');
    const winOverlay = document.getElementById('winOverlay');
    const finalScore = document.getElementById('finalScore');
    const finalCombo = document.getElementById('finalCombo');
    const modeDesc = document.getElementById('modeDesc');

    // ── 宇宙→主题映射（从主游戏接收） ──
    const UNIVERSE_MAP = { normal:'farm', cyber:'cyberpunk', ocean:'underwater', space:'space', ancient:'ancient' };

    const THEMES = {
      farm:       { label:'普通农场', className:'',               cow:'images/cow-farm.png',       desc:'默认田园风，轻松开荒' },
      cyberpunk:  { label:'赛博朋克', className:'theme-cyberpunk',cow:'images/cow-cyber.png',      desc:'霓虹电路闪烁，未来感十足' },
      underwater: { label:'深海水下', className:'theme-underwater',cow:'images/cow-underwater.png',desc:'气泡上浮，珊瑚环绕' },
      space:      { label:'太空站',   className:'theme-space',    cow:'images/cow-space.png',      desc:'星尘飘浮，银河发光' },
      ancient:    { label:'古代农村', className:'theme-ancient',  cow:'images/cow-ancient.png',    desc:'暖橙天空，复古田园' }
    };

    const themeFeedback = {
      farm:       { start:'点地块，让小牛开始干活', frenzy:'哞哞哞！', end:'小牛喘口气', win:'哞！耕完啦' },
      cyberpunk:  { start:'点击霓虹地块，启动耕作', frenzy:'霓虹过载！', end:'系统降温中', win:'赛博农田全部点亮' },
      underwater: { start:'点开珊瑚田，小牛下潜', frenzy:'气泡翻涌！', end:'海流变缓', win:'海底农田已翻松' },
      space:      { start:'点击舱外地块，开始耕作', frenzy:'推进器全开！', end:'推进器冷却', win:'太空农舱开垦完成' },
      ancient:    { start:'点地块，让老黄牛下田', frenzy:'锄声四起！', end:'日头西斜', win:'古田已翻好' }
    };

    let currentTheme = 'farm';
    const NORMAL = 'normal', GOLDEN = 'golden', STONE = 'stone';

    // ── 模式 ──
    // A: 限时30秒，无限耕田（耕完自动补）
    // B: 25块田，记录完成时间
    let currentMode = 'A';
    let tiles = [], score = 0, combo = 0, maxCombo = 0;
    let timerSec = 30, timerIv = null, gameRunning = false;
    let lastHitTime = 0; // 连击计时
    let comboRingAnim = null; // 连击倒计时动画

    const comboRing = document.getElementById('comboRing');
    const RING_CIRCUM = 150.8; // 2πr = 2*π*24

    function updateComboRing() {
      if (!comboRing) return;
      if (combo <= 0) {
        // 连击为0：圈消失
        comboRing.style.strokeDashoffset = RING_CIRCUM;
        comboRing.style.stroke = '#eee';
        return;
      }
      // 根据距离上次点击的时间，绘制剩余弧度
      const now = Date.now();
      const elapsed = now - lastHitTime;
      const remain = Math.max(0, 1 - elapsed / 1000);
      const offset = RING_CIRCUM * (1 - remain);
      comboRing.style.strokeDashoffset = offset;
      // 颜色：剩余时间越少越红
      if (remain < 0.3) comboRing.style.stroke = '#e53935';
      else if (remain < 0.6) comboRing.style.stroke = '#FF7043';
      else comboRing.style.stroke = '#f5ab1f';
    }

    function startComboRing() {
      if (comboRingAnim) cancelAnimationFrame(comboRingAnim);
      function tick() {
        updateComboRing();
        const elapsed = Date.now() - lastHitTime;
        if (elapsed < 1000 && combo > 0) {
          comboRingAnim = requestAnimationFrame(tick);
        } else if (elapsed >= 1000 && combo > 0) {
          // 超时断连击
          combo = 0;
          updateComboRing();
          updateUI();
        }
      }
      comboRingAnim = requestAnimationFrame(tick);
    }

    function resetComboRing() {
      if (comboRingAnim) cancelAnimationFrame(comboRingAnim);
      comboRingAnim = null;
      combo = 0;
      updateComboRing();
    }

    // ── 音效（Web Audio API，无需文件） ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }
    function playTick(type = 'normal') {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'golden') { osc.frequency.value = 880; gain.gain.value = 0.12; }
        else if (type === 'stone') { osc.frequency.value = 200; gain.gain.value = 0.1; }
        else if (type === 'combo') { osc.frequency.value = 660; gain.gain.value = 0.15; }
        else { osc.frequency.value = 440; gain.gain.value = 0.08; }
        osc.type = 'sine';
        osc.start(); osc.stop(ctx.currentTime + 0.07);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
      } catch(e) {}
    }
    function vibrate(ms = 20) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    const normalTexts = ['哞！翻土成功','小牛努力中','这块地松软了','今天也是勤劳小牛','耕一下，舒服了','田里又前进一步'];
    const goldenTexts = ['金色暴击！','哞哞大奖励','闪闪发光','好运气！'];

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function createTiles() {
      tiles = Array.from({ length: 25 }, (_, i) => {
        let type = NORMAL;
        const roll = Math.random();
        if (roll < 0.12) type = GOLDEN;
        else if (roll < 0.24) type = STONE;
        return { id: i, type, plowed: false, hp: type === STONE ? 2 : 1 };
      });
    }

    function renderTiles() {
      field.innerHTML = '';
      tiles.forEach(tile => {
        const btn = document.createElement('button');
        btn.className = `tile ${tile.plowed ? 'plowed' : 'unplowed'} ${tile.type === GOLDEN ? 'golden' : ''} ${tile.type === STONE ? 'stone' : ''}`;
        btn.disabled = tile.plowed;
        btn.dataset.id = tile.id;
        btn.addEventListener('click', () => hitTile(tile.id, btn));
        field.appendChild(btn);
      });
      updateUI();
    }

    function updateUI() {
      const totalPlowed = tiles.filter(t => t.plowed).length;
      const left = 25 - totalPlowed;
      const percent = Math.round((totalPlowed / 25) * 100);
      modeName.textContent = currentMode === 'A' ? '🌾 丰收竞赛' : '⚡ 闪电耕作';
      progressText.textContent = `${percent}%`;
      scoreText.textContent = String(score);
      comboText.textContent = combo > 1 ? `x${combo}🔥` : `x${combo}`;
      leftText.textContent = String(left);
      progressFill.style.width = `${percent}%`;

      if (currentMode === 'B' && left === 0) {
        endGame();
      }
    }

    function bumpCow(text) {
      cow.src = THEMES[currentTheme].cow;
      cow.classList.remove('bump');
      void cow.offsetWidth;
      cow.classList.add('bump');
      feedback.textContent = text;
      setTimeout(() => cow.classList.remove('bump'), 180);
    }

    function spawnFloat(text, sourceEl) {
      const rect = sourceEl.getBoundingClientRect();
      const wrapRect = fieldWrap.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'floating-text';
      el.textContent = text;
      el.style.left = `${rect.left - wrapRect.left + rect.width / 2 - 20}px`;
      el.style.top = `${rect.top - wrapRect.top + rect.height / 2 - 8}px`;
      fieldWrap.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function tileScore(tile) {
      let base = 10;
      if (tile.type === GOLDEN) base = 25;
      if (tile.type === STONE) base = 16;
      return base + Math.min(combo, 15);
    }

    function hitTile(id, sourceEl = null) {
      const tile = tiles.find(t => t.id === id);
      if (!tile) return;

      // ── 5b: 点已耕田断连击（立即清零圆圈）──
      if (tile.plowed) {
        if (combo > 0) { resetComboRing(); updateUI(); }
        return;
      }

      if (!gameRunning) startGame();

      // ── 5a: 1秒内未点击断连击 ──
      const now = Date.now();
      if (now - lastHitTime > 1000 && combo > 0) combo = 0;
      lastHitTime = now;

      combo += 1;
      startComboRing();
      maxCombo = Math.max(maxCombo, combo);
      tile.hp -= 1;

      if (tile.type === STONE && tile.hp > 0) {
        playTick('stone'); vibrate(30);
        bumpCow('这块地有点硬，再来一下');
        if (sourceEl) spawnFloat('硬！', sourceEl);
        updateUI();
        return;
      }

      tile.plowed = true;
      const add = tileScore(tile);
      score += add;

      let text = rand(normalTexts);
      let floatText = `+${add}`;
      let tickType = 'normal';

      if (tile.type === GOLDEN) { text = rand(goldenTexts); tickType = 'golden'; vibrate(40); }
      else if (tile.type === STONE) { text = '硬地拿下！'; vibrate(50); }
      else { vibrate(18); }

      if (combo >= 3 && combo % 3 === 0) {
        score += 8; floatText = `+${add+8} 🔥`; tickType = 'combo';
        text = `连击 ${combo}！小牛上头了`;
        vibrate([20, 10, 20]);
      }

      playTick(tickType);
      bumpCow(text);

      // ── 模式A: 耕完自动补 ──
      if (currentMode === 'A') {
        if (tiles.every(t => t.plowed)) {
          createTiles();
          renderTiles();
          return;
        }
      }

      renderTiles();
      if (sourceEl) {
        const newBtn = field.querySelector(`[data-id="${id}"]`);
        if (newBtn) spawnFloat(floatText, newBtn);
      }
    }

    function startGame() {
      if (gameRunning) return;
      gameRunning = true;
      clearInterval(timerIv);

      if (currentMode === 'A') {
        timerSec = 30;
        timerText.textContent = timerSec;
        timerIv = setInterval(() => {
          timerSec--;
          timerText.textContent = timerSec;
          if (timerSec <= 5) timerText.style.color = '#e53935';
          if (timerSec <= 0) endGame();
        }, 1000);
      } else {
        // 模式B: 正计时
        timerSec = 0;
        timerText.textContent = '0.0s';
        const start = Date.now();
        timerIv = setInterval(() => {
          timerSec = ((Date.now() - start) / 1000).toFixed(1);
          timerText.textContent = timerSec + 's';
        }, 100);
      }
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timerIv);
      timerText.style.color = '';
      finalScore.textContent = String(score);
      finalCombo.textContent = String(maxCombo);
      document.getElementById('finalTime').textContent = currentMode === 'B' ? timerSec + 's' : '30s';
      winOverlay.classList.add('show');
      feedback.textContent = themeFeedback[currentTheme].win;
      notifyComplete(score, maxCombo);
    }

    function notifyComplete(score, maxCombo) {
      const xp = 30 + Math.floor(score / 8) + Math.floor(maxCombo * 2);
      const payload = {
        type: 'farmGameComplete',
        xp,
        mode: currentMode,
        score,
        time: currentMode === 'B' ? parseFloat(timerSec) : null
      };
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(payload, '*');
      }
    }

    function getUnplowedTileIds() { return tiles.filter(t => !t.plowed).map(t => t.id); }

    function autoPlowOne() {
      const ids = getUnplowedTileIds();
      if (!ids.length) return;
      const id = ids[Math.floor(Math.random() * ids.length)];
      const btn = field.querySelector(`[data-id="${id}"]`);
      hitTile(id, btn);
    }

    function setTheme(themeKey) {
      currentTheme = THEMES[themeKey] ? themeKey : 'farm';
      document.body.className = THEMES[currentTheme].className || '';
      cow.src = THEMES[currentTheme].cow;
      feedback.textContent = themeFeedback[currentTheme].start;
    }

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      modeDesc.textContent = mode === 'A' ? '🌾 丰收竞赛：30秒内尽可能多耕地，田耕完自动补充' : '⚡ 闪电耕作：耕完25块田，最短时间上榜';
      resetGame();
    }

    function resetGame() {
      clearInterval(timerIv);
      gameRunning = false;
      score = 0; combo = 0; maxCombo = 0; lastHitTime = 0;
      if (comboRingAnim) { cancelAnimationFrame(comboRingAnim); comboRingAnim = null; }
      updateComboRing();
      timerSec = currentMode === 'A' ? 30 : 0;
      timerText.textContent = currentMode === 'A' ? '30' : '0.0s';
      timerText.style.color = '';
      winOverlay.classList.remove('show');
      createTiles();
      renderTiles();
    }

    // ── 事件绑定 ──
    resetBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);
    document.getElementById('modeA').addEventListener('click', () => setMode('A'));
    document.getElementById('modeB').addEventListener('click', () => setMode('B'));

    // ── 接收主游戏宇宙 ──
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'setUniverse') {
        const theme = UNIVERSE_MAP[e.data.universe] || 'farm';
        setTheme(theme);
      }
    });

    resetGame();
</script>
</body>
</html>
