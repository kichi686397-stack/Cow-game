<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小牛耕地</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-top: #fff8eb; --bg-bottom: #f8edd9;
      --shell-bg: rgba(255,255,255,0.78); --shell-border: #d9b67a;
      --panel-bg: #fff8ee; --panel-border: #e8c891;
      --field-bg: #f6e2b8; --field-border: #cf9d5f;
      --text-main: #5b3b1d; --text-soft: #8a4c11;
      --progress-a: #85c35d; --progress-b: #5ca63a;
      --btn-a: #ffcf72; --btn-b: #f5ab1f;
      --btn-sec-bg: #efe1c6; --btn-sec-border: #e0c08b;
      --tile-normal-a: #d3a269; --tile-normal-b: #b7793f;
      --tile-plowed-a: #8a572b; --tile-plowed-b: #6c411e;
      --tile-golden-a: #ffd86b; --tile-golden-b: #f1b52d;
      --tile-stone-a: #b9bcc4; --tile-stone-b: #8e949f;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text-main);
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 12px; overflow-x: hidden;
    }

    /* ── 顶部 HUD ── */
    .hud {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel-bg); border: 2px solid var(--panel-border);
      border-radius: 16px; padding: 8px 12px; margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .hud-stat { text-align: center; min-width: 48px; }
    .hud-label { font-size: 10px; opacity: .65; margin-bottom: 2px; }
    .hud-value { font-size: 18px; font-weight: 800; line-height: 1; }
    .hud-divider { width: 1px; height: 32px; background: var(--panel-border); flex-shrink: 0; }

    /* 模式拨动开关 */
    .mode-toggle {
      display: flex; align-items: center; gap: 6px;
      background: #f0e8d8; border-radius: 20px; padding: 4px 8px;
      cursor: pointer; user-select: none; margin-left: auto;
      border: 1.5px solid var(--btn-sec-border);
    }
    .mode-toggle-track {
      width: 38px; height: 20px; border-radius: 10px;
      background: #ccc; position: relative; transition: background .3s;
    }
    .mode-toggle-track.on { background: linear-gradient(90deg, var(--btn-a), var(--btn-b)); }
    .mode-toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; transition: left .3s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .mode-toggle-track.on .mode-toggle-knob { left: 20px; }
    .mode-toggle-label { font-size: 12px; font-weight: 700; color: var(--text-main); white-space: nowrap; }

    /* 连击圆圈 */
    .combo-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .combo-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .combo-center {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--text-main);
    }

    /* ── 地块 ── */
    .field-wrap {
      background: var(--field-bg); border-radius: 20px;
      border: 3px solid var(--field-border); padding: 12px;
      position: relative; overflow: hidden; flex: 1;
    }
    .field {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; user-select: none;
    }
    .tile {
      aspect-ratio: 1/1; border: 2px solid rgba(91,59,29,.15);
      border-radius: 14px; cursor: pointer; position: relative;
      transition: transform .1s ease, filter .15s ease;
      background: none; outline: none;
    }
    .tile:active { transform: scale(.93); }
    .tile.unplowed { background: linear-gradient(180deg, var(--tile-normal-a), var(--tile-normal-b)); }
    .tile.unplowed::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg,rgba(255,255,255,.07) 0px,rgba(255,255,255,.07) 3px,transparent 3px,transparent 11px);
    }
    /* 6: 耕完直接变色，不加✓ */
    .tile.plowed { background: linear-gradient(180deg, var(--tile-plowed-a), var(--tile-plowed-b)); cursor: default; }
    .tile.golden.unplowed { background: linear-gradient(180deg, var(--tile-golden-a), var(--tile-golden-b)); box-shadow: 0 0 12px rgba(255,208,89,.4); }
    .tile.stone.unplowed { background: linear-gradient(180deg, var(--tile-stone-a), var(--tile-stone-b)); }
    .tile.stone.unplowed::after {
      content: "×2"; position: absolute; right: 5px; bottom: 4px;
      font-size: 11px; font-weight: 700; color: #fff;
      background: rgba(0,0,0,.18); padding: 1px 5px; border-radius: 999px;
    }

    /* 浮动分数 */
    .floating-text {
      position: absolute; pointer-events: none; font-weight: 800; color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.25);
      animation: floatUp .9s ease forwards; z-index: 10;
    }
    @keyframes floatUp { 0%{transform:translateY(0) scale(.9);opacity:0} 15%{opacity:1} 100%{transform:translateY(-36px) scale(1.1);opacity:0} }

    /* 结算弹窗 */
    .overlay {
      position: absolute; inset: 10px;
      background: rgba(255,248,232,.95); border: 3px dashed var(--field-border);
      border-radius: 16px; display: none; justify-content: center;
      align-items: center; text-align: center; padding: 20px; z-index: 15;
    }
    .overlay.show { display: flex; flex-direction: column; }
    .overlay h2 { margin: 0 0 8px; font-size: 22px; }
    .overlay p { margin: 4px 0; font-size: 14px; }

    /* 按钮 */
    button { border: none; border-radius: 14px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform .12s; }
    button:active { transform: scale(.97); }
    .btn-primary { background: linear-gradient(180deg,var(--btn-a),var(--btn-b)); color: var(--text-main); margin-top: 10px; width: 100%; }
    .btn-sec { background: var(--btn-sec-bg); color: var(--text-soft); border: 1.5px solid var(--btn-sec-border); }

    /* 侧边栏 */
    .sidebar { display: flex; flex-direction: column; gap: 8px; width: 160px; flex-shrink: 0; }
    .panel { background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 16px; padding: 10px; }
    .cow-img { width: 80px; height: 80px; object-fit: contain; display: block; margin: 0 auto 6px; transition: transform .12s; }
    .cow-img.bump { transform: translateY(-8px) rotate(-5deg) scale(1.05); }
    .feedback { font-size: 12px; font-weight: 700; color: var(--text-soft); text-align: center; min-height: 36px; }
    .progress-bar { height: 8px; background: #f0dfbe; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg,var(--progress-a),var(--progress-b)); transition: width .2s; }

    /* 说明弹窗 */
    .tutorial-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .tutorial-box {
      background: #fff8ee; border: 3px solid var(--shell-border);
      border-radius: 20px; padding: 24px 20px; max-width: 320px;
      width: 90%; text-align: center;
    }
    .tutorial-box h2 { margin: 0 0 12px; font-size: 20px; }
    .tutorial-box ul { text-align: left; font-size: 13px; line-height: 2; padding-left: 18px; margin: 0 0 16px; }

    /* ── 主布局 ── */
    .shell { width: min(920px,100%); }
    .main { display: flex; gap: 10px; }

    /* ── 主题 ── */
    body.theme-cyberpunk { --bg-top:#0d1117; --bg-bottom:#0a0e1a; --text-main:#e0f0ff; --text-soft:#7df9ff; --field-bg:#0f1f30; --field-border:#0ff; --panel-bg:#0d1a2e; --panel-border:#0ff4; --tile-normal-a:#202447; --tile-normal-b:#121b37; --tile-plowed-a:#0a3a2a; --tile-plowed-b:#061f18; --btn-a:#ff00cc; --btn-b:#cc00ff; }
    body.theme-cyberpunk .tile.unplowed::before { background: repeating-linear-gradient(90deg,rgba(0,255,255,.06) 0px,rgba(0,255,255,.06) 2px,transparent 2px,transparent 10px); }
    body.theme-underwater { --bg-top:#0e4a6e; --bg-bottom:#0a2e45; --text-main:#e0f7ff; --text-soft:#7df0ff; --field-bg:#0a3a55; --field-border:#00bcd4; --panel-bg:#0a2e45; --panel-border:#00bcd466; --tile-normal-a:#1f758f; --tile-normal-b:#14576c; --tile-plowed-a:#0a4a5a; --tile-plowed-b:#062e3a; --btn-a:#00e5ff; --btn-b:#00b8d4; }
    body.theme-space { --bg-top:#0a0a1a; --bg-bottom:#050510; --text-main:#e8e8ff; --text-soft:#9090ff; --field-bg:#0f0f2a; --field-border:#3344cc; --panel-bg:#080820; --panel-border:#3344cc66; --tile-normal-a:#2e3768; --tile-normal-b:#1a2247; --tile-plowed-a:#1a1a40; --tile-plowed-b:#0a0a28; --btn-a:#6677ff; --btn-b:#3344cc; }
    body.theme-ancient { --tile-normal-a:#d09a59; --tile-normal-b:#a86a34; --tile-plowed-a:#6b4423; --tile-plowed-b:#4a2e14; }

    /* ── 移动端 ── */
    @media (max-width: 600px) {
      body { padding: 8px; }
      .shell { width: 100%; }
      .hud { padding: 6px 8px; gap: 6px; }
      .hud-value { font-size: 14px; }
      .hud-label { font-size: 9px; }
      .combo-wrap { width: 34px; height: 34px; }
      .combo-center { font-size: 11px; }
      .mode-toggle-label { font-size: 11px; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 6px; }
      .sidebar .panel { flex: 1; min-width: 120px; padding: 8px; }
      .cow-img { width: 56px; height: 56px; }
      .feedback { font-size: 11px; }
      .field { gap: 5px; }
      .tile { border-radius: 10px; }
    }
  </style>
</head>
<body>
  <!-- 7. 首次说明弹窗 -->
  <div class="tutorial-overlay" id="tutorialOverlay" style="display:none">
    <div class="tutorial-box">
      <div style="font-size:48px;margin-bottom:8px">🐄</div>
      <h2>小牛耕地</h2>
      <ul>
        <li>🌾 <b>丰收竞赛</b>：30秒内尽可能多耕地</li>
        <li>⚡ <b>闪电耕作</b>：耕完25块田最短时间</li>
        <li>🟡 金色地块：额外加分</li>
        <li>🪨 石头地块：需要点两下</li>
        <li>🔥 1秒内连续点击保持连击，点到耕过的地会断开</li>
      </ul>
      <button class="btn-primary" id="tutorialOkBtn">开始耕地！🐄</button>
    </div>
  </div>

  <div class="shell">
    <!-- HUD -->
    <div class="hud">
      <!-- 模式拨动开关 (1) -->
      <div class="mode-toggle" id="modeToggle" title="切换模式">
        <span class="mode-toggle-label" id="modeLabel">🌾</span>
        <div class="mode-toggle-track" id="modeTrack">
          <div class="mode-toggle-knob"></div>
        </div>
        <span class="mode-toggle-label" id="modeLabelR">⚡</span>
      </div>

      <div class="hud-divider"></div>

      <div class="hud-stat">
        <div class="hud-label">计时</div>
        <div class="hud-value" id="timerText">30</div>
      </div>
      <div class="hud-stat">
        <div class="hud-label">得分</div>
        <div class="hud-value" id="scoreText">0</div>
      </div>

      <!-- 连击圆圈 -->
      <div class="hud-stat">
        <div class="hud-label">连击</div>
        <div class="combo-wrap">
          <svg width="44" height="44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="#eee" stroke-width="4"/>
            <circle id="comboRing" cx="22" cy="22" r="18" fill="none" stroke="#f5ab1f"
              stroke-width="4" stroke-dasharray="113.1" stroke-dashoffset="113.1"
              stroke-linecap="round" style="transition:stroke-dashoffset .05s linear,stroke .1s"/>
          </svg>
          <div class="combo-center" id="comboText">x0</div>
        </div>
      </div>

      <!-- 自动 + 重置 -->
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn-sec" id="autoBtn" style="padding:6px 10px;font-size:12px">自动</button>
        <button class="btn-sec" id="resetBtn" style="padding:6px 10px;font-size:12px">重置</button>
      </div>
    </div>

    <div class="main">
      <!-- 地块 -->
      <div class="field-wrap" id="fieldWrap">
        <div class="field" id="field"></div>
        <div class="overlay" id="winOverlay">
          <div style="font-size:48px">🎉</div>
          <h2 id="winTitle">哞！耕完啦</h2>
          <p>得分：<strong id="finalScore" style="font-size:20px;color:#388E3C">0</strong></p>
          <p>最高连击：<span id="finalCombo">0</span></p>
          <p id="finalTimeRow">用时：<span id="finalTime">30s</span></p>
          <button class="btn-primary" id="restartBtn">再来一轮</button>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div class="sidebar">
        <div class="panel">
          <img id="cow" class="cow-img" src="images/cow-farm.png" alt="牛"/>
          <div class="feedback" id="feedback">点地块开始耕地</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── 设备检测 (3) ──
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 600;

    // ── DOM ──
    const field = document.getElementById('field');
    const fieldWrap = document.getElementById('fieldWrap');
    const timerText = document.getElementById('timerText');
    const scoreText = document.getElementById('scoreText');
    const comboText = document.getElementById('comboText');
    const feedback = document.getElementById('feedback');
    const cow = document.getElementById('cow');
    const progressFill = document.getElementById('progressFill');
    const autoBtn = document.getElementById('autoBtn');
    const resetBtn = document.getElementById('resetBtn');
    const winOverlay = document.getElementById('winOverlay');
    const finalScore = document.getElementById('finalScore');
    const finalCombo = document.getElementById('finalCombo');
    const comboRing = document.getElementById('comboRing');
    const RING_CIRCUM = 113.1; // 2π×18

    // ── 主题 / 宇宙 ──
    const UNIVERSE_MAP = { normal:'farm', cyber:'cyberpunk', ocean:'underwater', space:'space', ancient:'ancient' };
    const THEMES = {
      farm:       { label:'普通农场', className:'', cow:'images/cow-farm.png' },
      cyberpunk:  { label:'赛博朋克', className:'theme-cyberpunk', cow:'images/cow-cyber.png' },
      underwater: { label:'深海水下', className:'theme-underwater', cow:'images/cow-underwater.png' },
      space:      { label:'太空站',   className:'theme-space', cow:'images/cow-space.png' },
      ancient:    { label:'古代农村', className:'theme-ancient', cow:'images/cow-ancient.png' }
    };
    const themeFeedback = {
      farm:       { start:'点地块，让小牛开始干活', win:'哞！耕完啦' },
      cyberpunk:  { start:'点击霓虹地块，启动耕作', win:'赛博农田全部点亮' },
      underwater: { start:'点开珊瑚田，小牛下潜', win:'海底农田已翻松' },
      space:      { start:'点击舱外地块，开始耕作', win:'太空农舱开垦完成' },
      ancient:    { start:'点地块，让老黄牛下田', win:'古田已翻好' }
    };
    let currentTheme = 'farm';

    // ── 游戏状态 ──
    const NORMAL = 'normal', GOLDEN = 'golden', STONE = 'stone';
    let currentMode = 'A'; // A=丰收竞赛 B=闪电耕作
    let tiles = [], score = 0, combo = 0, maxCombo = 0;
    let timerSec = 30, timerIv = null, gameRunning = false;
    let lastHitTime = 0, comboRingAnim = null;

    // ── 音效 ──
    let audioCtx = null;
    function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
    function playTick(type = 'normal') {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const freqs = { golden:880, stone:200, combo:660, normal:440 };
        osc.frequency.value = freqs[type]||440;
        gain.gain.value = type==='normal'?0.07:0.12;
        osc.type = 'sine'; osc.start(); osc.stop(ctx.currentTime+0.07);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.07);
      } catch(e) {}
    }

    // ── 5: 震动：改用 touchstart 事件触发，绕过浏览器限制 ──
    function vibrate(ms) {
      try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {}
    }

    // ── 连击圆圈 ──
    function updateComboRing() {
      if (!comboRing) return;
      if (combo <= 0) { comboRing.style.strokeDashoffset = RING_CIRCUM; comboRing.style.stroke='#eee'; return; }
      const remain = Math.max(0, 1 - (Date.now()-lastHitTime)/1000);
      comboRing.style.strokeDashoffset = RING_CIRCUM*(1-remain);
      comboRing.style.stroke = remain<0.3?'#e53935':remain<0.6?'#FF7043':'#f5ab1f';
    }
    function startComboRing() {
      if (comboRingAnim) cancelAnimationFrame(comboRingAnim);
      function tick() {
        updateComboRing();
        const elapsed = Date.now()-lastHitTime;
        if (elapsed < 1000 && combo > 0) { comboRingAnim = requestAnimationFrame(tick); }
        else if (elapsed >= 1000 && combo > 0) { combo=0; updateComboRing(); updateUI(); }
      }
      comboRingAnim = requestAnimationFrame(tick);
    }
    function resetComboRing() {
      if (comboRingAnim) cancelAnimationFrame(comboRingAnim);
      comboRingAnim = null; combo = 0; updateComboRing();
    }

    // ── 地块 ──
    function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
    function createTiles() {
      tiles = Array.from({length:25}, (_,i) => {
        let type = NORMAL; const r = Math.random();
        if (r<0.12) type=GOLDEN; else if (r<0.24) type=STONE;
        return { id:i, type, plowed:false, hp:type===STONE?2:1 };
      });
    }
    function renderTiles() {
      field.innerHTML = '';
      tiles.forEach(tile => {
        const btn = document.createElement('button');
        // 6: 耕完直接变色，不显示✓
        btn.className = `tile ${tile.plowed?'plowed':'unplowed'} ${tile.type===GOLDEN?'golden':''} ${tile.type===STONE?'stone':''}`;
        btn.dataset.id = tile.id;
        // 5: touchstart 触发震动，click 处理逻辑
        btn.addEventListener('touchstart', () => { vibrate(18); }, { passive:true });
        btn.addEventListener('click', () => hitTile(tile.id, btn));
        field.appendChild(btn);
      });
      updateUI();
    }
    function updateUI() {
      const plowed = tiles.filter(t=>t.plowed).length;
      const pct = Math.round(plowed/25*100);
      scoreText.textContent = score;
      comboText.textContent = combo>1?`x${combo}🔥`:`x${combo}`;
      progressFill.style.width = pct+'%';
      if (currentMode==='B' && plowed===25) endGame();
    }

    function bumpCow(text) {
      cow.src = THEMES[currentTheme].cow;
      cow.classList.remove('bump'); void cow.offsetWidth; cow.classList.add('bump');
      feedback.textContent = text;
      setTimeout(()=>cow.classList.remove('bump'), 180);
    }
    function spawnFloat(text, el) {
      const r=el.getBoundingClientRect(), wr=fieldWrap.getBoundingClientRect();
      const div=document.createElement('div'); div.className='floating-text';
      div.textContent=text;
      div.style.left=(r.left-wr.left+r.width/2-20)+'px';
      div.style.top=(r.top-wr.top+r.height/2-8)+'px';
      fieldWrap.appendChild(div); setTimeout(()=>div.remove(),900);
    }
    function tileScore(tile) {
      let base = tile.type===GOLDEN?25:tile.type===STONE?16:10;
      return base + Math.min(combo,15);
    }

    function hitTile(id, sourceEl) {
      const tile = tiles.find(t=>t.id===id);
      if (!tile) return;
      // 5b: 点已耕田立即断连击
      if (tile.plowed) { if(combo>0){resetComboRing();updateUI();} return; }
      if (!gameRunning) startGame();
      // 5a: 1秒断连击
      const now = Date.now();
      if (now-lastHitTime>1000 && combo>0) combo=0;
      lastHitTime = now;
      combo++; maxCombo=Math.max(maxCombo,combo); tile.hp--;
      startComboRing();

      if (tile.type===STONE && tile.hp>0) {
        playTick('stone'); vibrate(30);
        bumpCow('这块地有点硬，再来一下');
        if (sourceEl) spawnFloat('硬！',sourceEl);
        updateUI(); return;
      }

      tile.plowed = true;
      const add = tileScore(tile); score += add;
      let text = rand(['哞！翻土成功','小牛努力中','这块地松软了','耕一下，舒服了']);
      let floatText = '+'+add, tickType = 'normal';
      if (tile.type===GOLDEN) { text='金色暴击！'; tickType='golden'; vibrate([15,5,15]); }
      else if (tile.type===STONE) { text='硬地拿下！'; vibrate(50); }
      else { vibrate(18); }
      if (combo>=3 && combo%3===0) { score+=8; floatText=`+${add+8}🔥`; tickType='combo'; text=`连击${combo}！`; vibrate([20,10,20]); }
      playTick(tickType); bumpCow(text);

      // 模式A耕完自动补
      if (currentMode==='A' && tiles.every(t=>t.plowed)) { createTiles(); renderTiles(); return; }
      renderTiles();
      if (sourceEl) { const nb=field.querySelector(`[data-id="${id}"]`); if(nb) spawnFloat(floatText,nb); }
    }

    // ── 计时 ──
    function startGame() {
      if (gameRunning) return;
      gameRunning = true;
      if (currentMode==='A') {
        timerSec=30; timerText.textContent=30; timerText.style.color='';
        timerIv=setInterval(()=>{
          timerSec--; timerText.textContent=timerSec;
          if (timerSec<=5) timerText.style.color='#e53935';
          if (timerSec<=0) endGame();
        },1000);
      } else {
        timerSec=0; timerText.textContent='0.0s';
        const start=Date.now();
        timerIv=setInterval(()=>{ timerSec=((Date.now()-start)/1000).toFixed(1); timerText.textContent=timerSec+'s'; },100);
      }
    }
    function endGame() {
      gameRunning=false; clearInterval(timerIv); timerText.style.color='';
      finalScore.textContent=score; finalCombo.textContent=maxCombo;
      document.getElementById('finalTime').textContent=currentMode==='B'?timerSec+'s':'30s';
      document.getElementById('winTitle').textContent=themeFeedback[currentTheme].win;
      document.getElementById('finalTimeRow').style.display=currentMode==='B'?'':'none';
      winOverlay.classList.add('show');
      notifyComplete(score,maxCombo);
    }
    function notifyComplete(score,maxCombo) {
      const xp=30+Math.floor(score/8)+Math.floor(maxCombo*2);
      if (window.parent&&window.parent!==window) {
        window.parent.postMessage({type:'farmGameComplete',xp,mode:currentMode,score,time:currentMode==='B'?parseFloat(timerSec):null},'*');
      }
    }

    function autoPlowOne() {
      const ids=tiles.filter(t=>!t.plowed).map(t=>t.id);
      if (!ids.length) return;
      const id=ids[Math.floor(Math.random()*ids.length)];
      hitTile(id, field.querySelector(`[data-id="${id}"]`));
    }

    // ── 1: 模式拨动开关 ──
    function setMode(mode) {
      currentMode=mode;
      const track=document.getElementById('modeTrack');
      track.classList.toggle('on', mode==='B');
      resetGame();
    }
    document.getElementById('modeToggle').addEventListener('click', ()=>{
      setMode(currentMode==='A'?'B':'A');
    });

    function setTheme(key) {
      currentTheme=THEMES[key]?key:'farm';
      document.body.className=THEMES[currentTheme].className||'';
      cow.src=THEMES[currentTheme].cow;
      feedback.textContent=themeFeedback[currentTheme].start;
    }
    function resetGame() {
      clearInterval(timerIv); gameRunning=false;
      score=0; combo=0; maxCombo=0; lastHitTime=0;
      timerSec=currentMode==='A'?30:0;
      timerText.textContent=currentMode==='A'?'30':'0.0s';
      timerText.style.color='';
      winOverlay.classList.remove('show');
      if(comboRingAnim){cancelAnimationFrame(comboRingAnim);comboRingAnim=null;}
      updateComboRing();
      createTiles(); renderTiles();
      feedback.textContent=themeFeedback[currentTheme].start;
    }

    autoBtn.addEventListener('click', autoPlowOne);
    resetBtn.addEventListener('click', resetGame);
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    // 接收主游戏宇宙
    window.addEventListener('message', e=>{
      if (e.data?.type==='setUniverse') setTheme(UNIVERSE_MAP[e.data.universe]||'farm');
    });

    // ── 7: 首次打开弹出说明 ──
    const TUTORIAL_KEY = 'cow_farm_tutorial_seen';
    if (!localStorage.getItem(TUTORIAL_KEY)) {
      document.getElementById('tutorialOverlay').style.display='flex';
    }
    document.getElementById('tutorialOkBtn').addEventListener('click', ()=>{
      localStorage.setItem(TUTORIAL_KEY,'1');
      document.getElementById('tutorialOverlay').style.display='none';
    });

    resetGame();
  </script>
</body>
</html>
